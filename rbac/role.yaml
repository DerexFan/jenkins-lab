apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: jenkins-agent
  namespace: default

rules:

- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
    - secrets

  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["apps"]

  resources:
    - deployments
    - replicasets
    - statefulsets

  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
